# Golden Partition Zone config — ResNet-18 (classification)
model: resnet18
task: classification
source: torchvision        # torchvision.models.resnet18(weights=DEFAULT)
input_shape: [1, 3, 224, 224]
# Enclave holds the final decision-level block: layer4.1 onward (avgpool + fc).
# Located empirically at layer4 by the inversion analysis (Table II): ~4.5x
# higher reconstruction MSE than a shallow split.
split:
  enclave_from: layer4.1   # everything from here to the end runs in the enclave
  enclave_modules: [layer4.1, avgpool, fc]
golden_partition_zone: layer4
paper_overhead_pct: 11.4
