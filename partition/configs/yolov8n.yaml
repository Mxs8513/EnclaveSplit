# Golden Partition Zone config — YOLOv8n (object detection)
model: yolov8n
task: detection
source: ultralytics         # ultralytics YOLO('yolov8n.pt')
input_shape: [1, 3, 640, 640]
# Enclave holds the three decoupled detection heads.
split:
  enclave_from: model.22     # Detect head (decoupled)
  enclave_modules: [detect_heads]
golden_partition_zone: detection_heads
paper_overhead_pct: 14.2
